services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - ../../apps/api/.env
    ports:
      - "3001:3001"
    depends_on:
      - redis

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - ../../apps/worker/.env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data

volumes:
  redis_prod_data:
